    description: '30/60/90 day plan. First milestone: stakeholder map.'
  - title: 'Review at-risk accounts'
    description: 'Who''s renewing next quarter? Who''s showing churn signals?'
  - title: 'Run the QBR with Initech'
    description: 'Prepare deck, book exec, send 48h in advance.'
